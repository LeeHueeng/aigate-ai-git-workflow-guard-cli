<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIGate Documentation</title>
  <meta name="description" content="AIGate multilingual HTML documentation.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --text: #172033;
      --muted: #5d687a;
      --line: #d9e0ea;
      --accent: #1167d8;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    main {
      width: min(920px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 36px;
    }

    a {
      display: block;
      min-height: 84px;
      padding: 18px;
      color: var(--text);
      text-decoration: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    a:hover {
      border-color: var(--accent);
    }

    strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    span {
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>AIGate</h1>
    <p>
      Multilingual HTML documentation for the AI-friendly Git workflow guard CLI.
      Choose a language to view the current process charts, commands, shipped features,
      and planned roadmap.
    </p>

    <nav aria-label="Documentation languages">
      <a href="aigate-overview.ko.html">
        <strong>한국어</strong>
        <span>AIGate 개요와 사용 흐름</span>
      </a>
      <a href="aigate-overview.en.html">
        <strong>English</strong>
        <span>Overview, commands, and workflow charts</span>
      </a>
      <a href="aigate-overview.ja.html">
        <strong>日本語</strong>
        <span>概要、コマンド、ワークフロー</span>
      </a>
      <a href="aigate-overview.zh.html">
        <strong>中文</strong>
        <span>概览、命令和流程图</span>
      </a>
    </nav>
  </main>
</body>
</html>
