version: 1

project:
  name: AIGate
  package: "@aigate/cli"
  defaultBranch: main

distribution:
  primaryRegistry: npm
  packageName: "@aigate/cli"
  releaseChannels:
    stable: latest
    candidate: next
    beta: beta
    experimental: canary

reports:
  defaultFormat: markdown
  outputs:
    - markdown
    - html
    - json
    - sarif

security:
  scanChangedFiles: true
  maxFileBytes: 250000
  blockOnSecretFindings: true
  rules:
    - aws-access-key-id
    - github-token
    - slack-token
    - private-key
    - generic-secret

notifications:
  defaults:
    BLOCK:
      - terminal
      - slack
    WARN:
      - terminal
    PR_ONLY:
      - terminal
      - slack
    SECRET_DETECTED:
      - terminal
      - slack
      - email

aiIntegrations:
  providers:
    - codex
    - gemini
  generatedFiles:
    - AGENTS.md
    - GEMINI.md
    - .aigate/integrations.json
    - .aigate/integrations/README.md
    - .aigate/integrations/codex.md
    - .aigate/integrations/gemini.md
  requiredCommands:
    - npm run ci
    - aigate git-ready
    - aigate push --dry-run origin <branch>

branchStrategy:
  default: github-flow-with-release-channels
  protectedBranches:
    - main
  workBranches:
    - codex/*
    - feature/*
    - fix/*
    - docs/*
    - chore/*
    - test/*
    - experiment/*
  releaseBranches:
    - release/*
    - hotfix/*
  requiredChecks:
    - test (20)
    - test (22)

qualityGates:
  beforePush:
    minimumProjectScore: 80
    commands:
      - npm run ci
      - node src/cli.mjs report --format markdown
    blockOn:
      - possible secret-bearing filenames
      - project foundation score below threshold
