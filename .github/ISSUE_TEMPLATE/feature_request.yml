name: Feature request
description: Suggest a new AIGate capability or workflow.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - checks
        - reports
        - notifications
        - project evaluation
        - branch strategy
        - distribution
        - documentation
    validations:
      required: true
