name: AIGate
description: Run AIGate repository checks and reports in GitHub Actions.
author: AIGate Maintainers

branding:
  icon: shield
  color: blue

inputs:
  command:
    description: AIGate command to run. Supported values are git-ready, check, doctor, pr-check, report, audit-report, evaluate-project, github-check, release-check, release-check-npm, branch-strategy, and branch-strategy-compare.
    required: false
    default: git-ready
  report-format:
    description: Report format for report-producing commands.
    required: false
    default: markdown
  output:
    description: Optional output file for report-producing commands.
    required: false
    default: ""
  language:
    description: Optional CLI language. Supported values are en, ko, ja, and zh.
    required: false
    default: ""
  package:
    description: npm package spec used to run AIGate.
    required: false
    default: aigate-cli@latest

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        package-manager-cache: false

    - name: Run AIGate
      shell: bash
      run: |
        set -euo pipefail

        COMMAND="${{ inputs.command }}"
        FORMAT="${{ inputs.report-format }}"
        OUTPUT="${{ inputs.output }}"
        LANGUAGE="${{ inputs.language }}"
        PACKAGE="${{ inputs.package }}"

        AIGATE=(npx -y "$PACKAGE")
        COMMON_ARGS=()
        OUTPUT_ARGS=()

        if [[ -n "$LANGUAGE" ]]; then
          COMMON_ARGS+=(--language "$LANGUAGE")
        fi

        if [[ -n "$OUTPUT" ]]; then
          OUTPUT_ARGS+=(--output "$OUTPUT")
        fi

        case "$COMMAND" in
          check|git-ready|doctor|release-check)
            "${AIGATE[@]}" "$COMMAND" "${COMMON_ARGS[@]}"
            ;;
          release-check-npm)
            "${AIGATE[@]}" release-check --npm "${COMMON_ARGS[@]}"
            ;;
          branch-strategy)
            "${AIGATE[@]}" branch-strategy "${COMMON_ARGS[@]}" "${OUTPUT_ARGS[@]}"
            ;;
          branch-strategy-compare)
            "${AIGATE[@]}" branch-strategy --compare --format "$FORMAT" "${COMMON_ARGS[@]}" "${OUTPUT_ARGS[@]}"
            ;;
          report|pr-check|audit-report)
            "${AIGATE[@]}" "$COMMAND" --format "$FORMAT" "${COMMON_ARGS[@]}" "${OUTPUT_ARGS[@]}"
            ;;
          evaluate-project)
            "${AIGATE[@]}" evaluate-project --report --format "$FORMAT" "${COMMON_ARGS[@]}" "${OUTPUT_ARGS[@]}"
            ;;
          github-check)
            "${AIGATE[@]}" github check --format "$FORMAT" "${COMMON_ARGS[@]}" "${OUTPUT_ARGS[@]}"
            ;;
          *)
            echo "Unsupported AIGate action command: $COMMAND" >&2
            exit 2
            ;;
        esac
