name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish as a dry run"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Validate
        run: npm run ci

      - name: Check published version
        id: published
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} already exists on npm."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is not published yet."
          fi

      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: npm publish --access public --dry-run

      - name: Publish
        if: ${{ (github.event_name == 'push' || inputs.dry_run == 'false') && steps.published.outputs.exists != 'true' }}
        run: npm publish --access public --provenance

      - name: Skip already published version
        if: ${{ (github.event_name == 'push' || inputs.dry_run == 'false') && steps.published.outputs.exists == 'true' }}
        run: echo "Package version already exists on npm; skipping publish."
