<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">AIGate social preview</title>
  <desc id="desc">Stop risky AI-generated Git changes before push.</desc>
  <rect width="1280" height="640" fill="#0d1829"/>
  <rect x="72" y="74" width="1136" height="492" rx="28" fill="#111f34" stroke="#2b456a" stroke-width="2"/>
  <circle cx="118" cy="118" r="12" fill="#ff5f57"/>
  <circle cx="154" cy="118" r="12" fill="#febc2e"/>
  <circle cx="190" cy="118" r="12" fill="#28c840"/>
  <text x="96" y="214" fill="#e7f0ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="94" font-weight="800">AIGate</text>
  <text x="96" y="294" fill="#9fb5d1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="600">Stop risky AI-generated Git changes before push.</text>
  <g font-family="'SFMono-Regular', Consolas, monospace" font-size="30" font-weight="700">
    <text x="102" y="384" fill="#58d68d">$ aigate doctor</text>
    <text x="102" y="432" fill="#e7f0ff">AIGate doctor: READY</text>
    <text x="102" y="480" fill="#58d68d">$ aigate install-hook --pre-push</text>
    <text x="102" y="528" fill="#e7f0ff">git push now runs aigate git-ready first.</text>
  </g>
  <rect x="848" y="348" width="284" height="72" rx="16" fill="#2f6fed"/>
  <text x="990" y="395" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="26" font-weight="800">pre-push guard</text>
</svg>
